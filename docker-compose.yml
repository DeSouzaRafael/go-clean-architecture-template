services:

  postgres:
    container_name: go_clean_postgres
    image: postgres:16-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: go_clean_app
    image: go_clean_app
    env_file: .env
    ports:
      - "${HTTP_PORT:-8082}:${HTTP_PORT:-8082}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
